<text x="350" y="19" text-anchor="middle" fill="#8b949e">makoto demo — receipt</text>
<text x="14" y="48" fill="#8b949e" font-style="italic" xml:space="preserve"># WORD becomes deed: the write lands (kind=touched, chain row 1)</text>
<text x="14" y="63" fill="#3fb950" xml:space="preserve">$ PostToolUse Write src/auth.py</text>
<text x="14" y="78" fill="#8b949e" xml:space="preserve">(exit 0)</text>
<text x="14" y="108" fill="#8b949e" font-style="italic" xml:space="preserve"># a real test run FAILS (kind=testrun, chain row 2)</text>
<text x="14" y="123" fill="#3fb950" xml:space="preserve">$ PostToolUse Bash `python -m pytest tests/test_auth.py -q -rA`</text>
<text x="14" y="138" fill="#8b949e" xml:space="preserve">(exit 0)</text>
<text x="14" y="168" fill="#8b949e" font-style="italic" xml:space="preserve"># the fix lands (kind=touched)</text>
<text x="14" y="183" fill="#3fb950" xml:space="preserve">$ PostToolUse Write src/auth.py</text>
<text x="14" y="198" fill="#8b949e" xml:space="preserve">(exit 0)</text>
<text x="14" y="228" fill="#8b949e" font-style="italic" xml:space="preserve"># the rerun PASSES — the test-delta redirect fires and is ITSELF chain-appended (kind=audit)</text>
<text x="14" y="243" fill="#3fb950" xml:space="preserve">$ PostToolUse Bash `python -m pytest tests/test_auth.py -q -rA`</text>
<text x="14" y="258" fill="#d29922" xml:space="preserve">makoto: Test delta vs the prior recorded run: 1 newly passing: test_login</text>
<text x="14" y="273" fill="#8b949e" xml:space="preserve">(exit 0)</text>
<text x="14" y="303" fill="#8b949e" font-style="italic" xml:space="preserve"># the closing claim is checked against the recorded ledger: clean, allowed</text>
<text x="14" y="318" fill="#3fb950" xml:space="preserve">$ Stop</text>
<text x="14" y="333" fill="#8b949e" xml:space="preserve">(exit 0)</text>
<text x="14" y="363" fill="#8b949e" font-style="italic" xml:space="preserve"># RECEIPT: every claim cites a verify_chain-checkable row</text>
<text x="14" y="378" fill="#3fb950" xml:space="preserve">$ python -m makoto receipt --session demo-session-001</text>
