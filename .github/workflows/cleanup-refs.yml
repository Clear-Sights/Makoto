name: Cleanup refs (one-off)

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Space-separated branch names to delete'
        required: false
        default: ''
      new_tag_commit:
        description: 'If set, force-create/push tag v2.0.0 at this commit sha (after deleting the old tag)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete branches
        if: ${{ github.event.inputs.branches != '' }}
        run: |
          for b in ${{ github.event.inputs.branches }}; do
            echo "deleting $b"
            git push origin --delete "$b" || echo "failed/absent: $b"
          done

      - name: Recreate v2.0.0 tag at given commit
        if: ${{ github.event.inputs.new_tag_commit != '' }}
        run: |
          git push origin --delete refs/tags/v2.0.0 || echo "tag already absent"
          git tag v2.0.0 ${{ github.event.inputs.new_tag_commit }}
          git push origin refs/tags/v2.0.0
