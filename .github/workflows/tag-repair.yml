name: tag-repair
on: workflow_dispatch
permissions:
  contents: write
jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: restore v1.4.0 as a lightweight tag on its original target
        run: |
          git tag -f v1.4.0 bc57f7352fdcde4ec2ea7810b999a083df543874
          git push --force origin refs/tags/v1.4.0
