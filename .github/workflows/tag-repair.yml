# Temporary operator utility (2026-07-10): re-point every tag to its identity-rewritten
# target (map committed alongside as .github/tag-map.json; the session proxy 403s tag
# updates, so the ref moves run HERE). Deletes tmp/taghist-* upload branches afterwards.
# Removed again once tags verify.
name: tag-repair
on: workflow_dispatch
permissions:
  contents: write
jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const map = JSON.parse(fs.readFileSync('.github/tag-map.json', 'utf8'));
            const { owner, repo } = context.repo;
            for (const [name, spec] of Object.entries(map)) {
              let sha = spec.target;
              if (spec.annotated) {
                const { data: tagObj } = await github.rest.git.createTag({
                  owner, repo, tag: name, message: spec.message || name,
                  object: spec.target, type: 'commit' });
                sha = tagObj.sha;
              }
              try {
                await github.rest.git.updateRef({ owner, repo, ref: `tags/${name}`, sha, force: true });
                core.info(`updated tag ${name} -> ${sha}`);
              } catch (e) {
                await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${name}`, sha });
                core.info(`created tag ${name} -> ${sha}`);
              }
            }
            const { data: branches } = await github.rest.repos.listBranches({ owner, repo, per_page: 100 });
            for (const b of branches) {
              if (b.name.startsWith('tmp/taghist-')) {
                await github.rest.git.deleteRef({ owner, repo, ref: `heads/${b.name}` });
                core.info(`deleted upload branch ${b.name}`);
              }
            }
