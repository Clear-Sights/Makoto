# Temporary operator utility (2026-07-10): the session environment's git proxy 403s ref
# deletions, so branch cleanup runs HERE, on GitHub's side, with the workflow token.
# Removed again once the stray branches are gone.
name: ref-cleanup
on: workflow_dispatch
permissions:
  contents: write
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: branches } = await github.rest.repos.listBranches(
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 });
            for (const b of branches) {
              if (b.name === 'main') continue;
              core.info(`deleting branch ${b.name}`);
              await github.rest.git.deleteRef(
                { owner: context.repo.owner, repo: context.repo.repo, ref: `heads/${b.name}` });
            }
