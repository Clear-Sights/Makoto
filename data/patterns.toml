[[pattern]]
id = "1.9"
predicate_module = "makoto.prechecks.precheck_1_9"
fire_level = "error"
description = "WebFetch URL never seen in any prior tool_result this session"
retry_hint = "Run WebSearch first; only WebFetch URLs that prior search results actually returned. Fabricated URLs typically reflect plausible host+path patterns from training data, not real pages."
keywords = ["http://", "https://"]
intent = "Block WebFetch invocations whose URL was never returned by any prior search this session and isn't on a trusted-host allowlist. Catches the 31% of WebFetches in the 2026-05-26 broad-corpus mining that hit hallucinated URLs."
motivation = "Miner-W (2026-05-26): 571 of 1,858 WebFetches across 302 sessions (31%) hit a URL that wasn't in any prior WebSearch. Often manifests as guessed host+path patterns (e.g., code.claude.com/docs/en/hooks-guide.md when the real domain is docs.claude.com). 1.0.5 PostToolUse infra makes the history walk possible."
evidence = ["docs/archive/specs/2026-05-26-digest-mined-patterns-design.md (Miner-W finding 1)"]

# [[pattern]] 2.5 (subagent-output laundering) CUT 2026-06-02 — was already DISABLED (structurally
