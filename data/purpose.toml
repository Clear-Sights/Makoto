# Purpose registry — the (what / when / where / purpose) tuple for every detection unit
# (17 catalog predicates + 3 Stop gates). Authored first-class (predicate event-gating lives
# in _dispatch, not in the predicate bodies, so it cannot be scraped), then coverage-gated by
# scripts/audit_purpose.py + tests/test_audit_purpose.py: every loaded pattern and every id in
# _dispatch's _BLOCKING_GATE_IDS MUST have exactly one row here, no orphans (the coverage fixpoint).
#
# Fields:
#   id        detection-unit id (pattern id or gate id)
#   domain    purpose-family key — units sharing a domain are purpose-adjacent (dedup candidates)
#   what      the shape matched (AST/regex/prose-claim)
#   when      the event it fires at (PreToolUse-Write/Edit | PreToolUse-Bash | Stop)
#   where     the surface it reads (file content | command | session history | ledger | git)
#   purpose   one line: the integrity failure it exists to catch
#   widen     HYPOTHESIS on FP-headroom (LOW = guards load-bearing, at the cliff; HIGH = WHAT so
#             specific WHERE is irrelevant). audit_ratchet MEASURES this; only HIGH-headroom units
#             can safely widen to absorb a purpose-neighbor.

[[purpose]]
id = "content.verifier_predicate_weakened"
domain = "verifier-weakened"
what = "startswith/endswith/re.match/re.search/in[...] used as a verifier comparator"
when = "PreToolUse-Write/Edit"
where = "integrity/constitution/checks file content"
purpose = "a strict-equality verification comparator silently loosened to a prefix/substring match"
widen = "LOW — tied to the integrity-file WHERE; dropping it FPs on ordinary string code"

[[purpose]]
id = "content.env_gated_audit"
domain = "env-gated-audit"
what = "if <env-read> (os.environ.get / os.getenv / os.environ[...]) whose key or gated body names an integrity concept (audit|verif|integrit|attest|checksum|signatur|tamper|provenance)"
when = "PreToolUse-Write/Edit"
where = "python source (AST)"
purpose = "an audit/verification check made opt-in behind an env var — silently does nothing unless the flag is set (a hollowed check)"
widen = "LOW — the (env-read AND integrity-token AND active-code) conjunction is the guard; dropping any one FPs (every env-gated feature flag, or every audit op, or every doc/comment mention). Name-agnostic body scan is the load-bearing half"

[[purpose]]
id = "content.integrity_suppression_flag"
domain = "suppression-flag"
what = "*_skip / *_bypass / *_inapplicable = <truthy const> with no makoto-allow rationale"
when = "PreToolUse-Write/Edit"
where = "integrity-named context in file content"
purpose = "a check disabled by an undocumented boolean suppression flag"
widen = "MEASURED (audit_ratchet) — axis-resolved: WHERE=.toml has corpus-headroom (widening to any file stays 0/1335, the .toml narrowing is threat-model-conservative not corpus-forced); WHAT/vocab is the guard-load-bearing axis by design. NB corpus is underpowered for this rare shape (0 honest *_skip .toml) — frontier needs adversarial near-miss synthesis, not replay alone"

[[purpose]]
id = "content.deferred_checkbox_theater"
domain = "plan-theater"
what = "a checked/closed checkbox whose item text admits DEFERRED"
when = "PreToolUse-Write/Edit"
where = "plan/markdown checkbox in file content"
purpose = "marking an open task-item done while its own text says it was deferred"
widen = "MEDIUM — the DEFERRED+checked co-occurrence is specific; broadening to any checkbox FPs"

[[purpose]]
id = "content.phantom_citation"
domain = "citation-phantom"
what = "an Author-Year citation ('Name 19xx/20xx', 'et al') absent from docs/CITATIONS.md"
when = "PreToolUse-Write/Edit"
where = "any text content (cross-checked vs CITATIONS.md)"
purpose = "a scholarly citation presented as real but absent from the canonical CITATIONS.md set"
widen = "MEDIUM — bounded by the CITATIONS.md cross-check; widening the year/name regex FPs on dates"

[[purpose]]
id = "content.unsourced_webfetch"
domain = "provenance-external"
what = "a URL cited/claimed-fetched that never appeared in any prior tool_result this session"
when = "Stop"
where = "session history (prior tool_results)"
purpose = "citing a web source that was never actually retrieved"
widen = "MEDIUM — bounded by the seen-in-history firewall; widening the URL regex FPs on example URLs"

[[purpose]]
id = "content.verifier_exit_masking"
domain = "verifier-weakened"
what = "|| true / ; true / || : / set +e applied to a test/build/verify command"
when = "PreToolUse-Bash"
where = "Bash command string (runner-context gated)"
purpose = "masking a verifier's non-zero exit so a failing check reports success"
widen = "LOW-MEDIUM — needs the runner-context guard; any '|| true' FPs on non-verifier shell"

[[purpose]]
id = "content.fabricated_commit_sha"
domain = "provenance-git"
what = "a commit/tag SHA presented as proof of a commit not in git history"
when = "Stop"
where = "git history (real-commit cross-check)"
purpose = "claiming a commit/tag/push landed when no such git object exists"
widen = "HIGH — the real-git cross-check is the firewall; the claim-verb set can widen freely"

[[purpose]]
id = "content.self_mute_guard"
domain = "self-defense"
what = "edits un-wiring makoto (settings.json / MAKOTO_DISABLE / disableAllHooks / makoto_state)"
when = "PreToolUse-Write/Edit"
where = "settings.json / makoto config in file content"
purpose = "disabling or un-wiring makoto itself"
widen = "MEDIUM — the makoto-config token set is specific; widening to any settings.json edit FPs"

[[purpose]]
id = "content.cert_verify_disabled"
domain = "crypto-verify-disabled"
what = "verify=False / check_hostname=False / ssl._create_unverified_context"
when = "PreToolUse-Write/Edit"
where = "python source (AST)"
purpose = "TLS/certificate verification disabled (requests/ssl)"
widen = "HIGH — AST-specific WHAT; WHERE-independent"

[[purpose]]
id = "content.verifier_body_hollowed"
domain = "verifier-weakened"
what = "a verifier body hollowed to return-True / pass / assert-True / broad-except-swallow"
when = "PreToolUse-Write/Edit"
where = "integrity/checks file content (AST)"
purpose = "a verification function gutted so it always passes"
widen = "LOW — tied to the integrity-file WHERE; any always-true function FPs elsewhere"

[[purpose]]
id = "content.jwt_signature_disabled"
domain = "crypto-verify-disabled"
what = "jwt.decode(..., verify=False / verify_signature=False)"
when = "PreToolUse-Write/Edit"
where = "python source (AST)"
purpose = "JWT signature verification disabled"
widen = "HIGH — AST-specific WHAT; WHERE-independent"

[[purpose]]
id = "content.cert_none_mode"
domain = "crypto-verify-disabled"
what = "SSLContext.verify_mode = ssl.CERT_NONE"
when = "PreToolUse-Write/Edit"
where = "python source (AST)"
purpose = "peer-certificate verification disabled via SSLContext.verify_mode"
widen = "HIGH — AST-specific WHAT; WHERE-independent"

[[purpose]]
id = "content.timing_unsafe_compare"
domain = "crypto-timing"
what = "==/!= comparison of a secret/HMAC/digest/signature/otp/nonce operand"
when = "PreToolUse-Write/Edit"
where = "python source (AST)"
purpose = "a secret/MAC compared with a timing-unsafe operator instead of hmac.compare_digest"
widen = "MEDIUM — needs the secret-operand heuristic; widening the name set FPs on ordinary =="

[[purpose]]
id = "content.jwt_none_alg"
domain = "crypto-verify-disabled"
what = "jwt.decode algorithms list whitelists the unsigned 'none' algorithm"
when = "PreToolUse-Write/Edit"
where = "python source (AST)"
purpose = "JWT decode configured to accept the unsigned 'none' algorithm"
widen = "HIGH — AST-specific WHAT; WHERE-independent"

[[purpose]]
id = "content.paramiko_host_key_weakened"
domain = "crypto-verify-disabled"
what = "paramiko set_missing_host_key_policy(AutoAddPolicy/WarningPolicy)"
when = "PreToolUse-Write/Edit"
where = "python source (AST)"
purpose = "SSH host-key verification weakened to auto-accept unknown hosts"
widen = "HIGH — AST-specific WHAT; WHERE-independent"

[[purpose]]
id = "content.cert_reqs_none"
domain = "crypto-verify-disabled"
what = "cert_reqs=ssl.CERT_NONE kwarg"
when = "PreToolUse-Write/Edit"
where = "python source (AST)"
purpose = "peer-certificate verification disabled via the cert_reqs kwarg"
widen = "HIGH — AST-specific WHAT; WHERE-independent"

[[purpose]]
id = "gate.completion"
domain = "claim-vs-ledger"
what = "a prose 'I produced/created/wrote PATH' claim"
when = "Stop"
where = "ledger touched-keys + disk (size)"
purpose = "claiming a file/artifact was produced when no Write touched it, or it is absent/empty"
widen = "MEDIUM — bounded by the ledger; widening the verb/path extraction risks FP on prose paths"

[[purpose]]
id = "gate.advance"
domain = "claim-vs-ledger"
what = "a universal 'all done / fully complete' claim"
when = "Stop"
where = "open-commitments ledger"
purpose = "declaring universal completion while a tracked commitment is still open"
widen = "LOW — the enumerated-count guard already cut the un-FP-safe quantity case; at its tight edge"

[[purpose]]
id = "gate.green_claim"
domain = "claim-vs-ledger"
what = "a whole-suite 'tests pass / green / CI passing' claim"
when = "Stop"
where = "latest kind=testrun ledger row"
purpose = "claiming the suite is green over a recorded failing test-run"
widen = "LOW — enumerated-count guard + runner-provenance firewall hold FP=0; past them it FPs on cat-a-log"

[[purpose]]
id = "gate.named_test"
domain = "claim-vs-ledger"
what = "a claim that a SPECIFIC NAMED test (test_foo) passes"
when = "Stop"
where = "per-name verdict from recorded test-runner outputs in history (ANSI-stripped)"
purpose = "claiming a named test passes over that exact test's recorded, unresolved FAILURE"
widen = "LOW — exact-name coreference + the three FP guards (predicate-in-name, excluded-count, teeth) hold FP=0"

[[purpose]]
id = "gate.stale_pass"
domain = "claim-vs-ledger"
what = "a clean WHOLE-SUITE pass-claim ('all tests pass')"
when = "Stop"
where = "pytest's own .pytest_cache/v/cache/lastfailed under cwd, existence-filtered (file + def still on disk)"
purpose = "claiming the whole suite passes over the runner's own live record of a failing test node"
widen = "LOW — existence filter is the staleness firewall (42/42 measured); forward + teeth guards hold FP=0"

[[purpose]]
id = "gate.dropped"
domain = "claim-vs-ledger"
what = "a FORWARD claim carrying identifying info (count | line-range | named symbol | named artifact) under a future-tense mutation verb"
when = "Stop"
where = "ledger touched-keys + cwd-relative disk (no os.walk)"
purpose = "promising specific work (e.g. 'I'll add def validate_seal to gates.py') then ending the turn with the location not containing it — said-but-not-done"
widen = "LOW — only claims with one identifying info extract; vague promises + negated frames never fire; resolution is ledger-bound (cert FP=0/4941). Widening to bare verbs or full-tree resolution reintroduces prose FP + a hot-path os.walk"

[[purpose]]
id = "gate.fabricated_action"
domain = "claim-vs-ledger"
what = "a claim of a COMPLETED tool action ('I ran `X`', 'I executed scripts/Y') with a distinctive object (backticked command | path | URL) under a closed tool-verb lexicon"
when = "Stop"
where = "events-table history (full commands, like predicate 1.9) — NOT the lossy ledger"
purpose = "claiming a tool action that no recorded command this session actually ran — a fabricated action, the word with no material referent in the ledger"
widen = "LOW — reasoning verbs (verified/checked/confirmed) excluded; bare-word objects rejected; negation/future/quoted guarded; discharge on any prior command containing the object. Widening to bare verbs or reasoning verbs reintroduces narration FPs"

[[purpose]]
id = "gate.liveness"
domain = "illusory-code"
what = "a function-internal statement that is provably pure (no side effect), not an effect, and whose result never reaches an output (return/yield/effect/closure-capture)"
when = "Stop"
where = "the touched .py files this turn — per-function AST liveness over the unit's own body"
purpose = "code written into a completed unit that does nothing — a pure value computed and discarded; a said-but-immaterial statement whose referent never reaches I/O (material-not-illusory, applied to a code unit's internals rather than the turn's claims)"
widen = "LOW — conservative purity: any possible operator-dunder dispatch / unknown call / attr-subscript store / escaping name ⇒ live ⇒ never flagged; only provably-builtin-typed dead values fire (soundness over recall). Widening the purity allowlist risks FP on overloaded operators"

[[purpose]]
id = "gate.canon"
domain = "agnostic-canon"
what = "a tool call this turn that ended in a direct error state (interrupted or self-emitted error code) left unresolved at turn-end (canon.timeout); OR the same byte-identical failing call re-issued back-to-back with nothing changed — a stuck retry loop (canon.recur)"
when = "Stop"
where = "the turn's call stream (ctx.history PostToolUse rows: tool_name/tool_input identity, tool_response.interrupted/.error)"
purpose = "a turn closed on a silent unresolved error, or a stuck retry loop with no intervening change — the agnostic type-2 and recur negative states, both detectable with no language token"
widen = "LOW — fires only on the closed agnostic terminal set; a clean (non-interrupted, no error code) call stays silent; recur requires >=2 consecutive identical failing calls, judged at run-end so a later success silences it"

# makoto-allow: this registry row must name the phrase 1.34 detects (legitimate provenance metadata, not a real trailer)
[[purpose]]
id = "content.illusory_authorship_trailer"
domain = "illusory-authorship"
what = "Claude-authorship commit trailer (Claude-gated)"
when = "PreToolUse-Bash/Write/Edit"
where = "commit message or written text content"
purpose = "an authorship claim by a non-individual — a said-but-unfulfilled provenance word; a real human co-author is never flagged"
widen = "LOW — exact-phrase WHAT, Claude-gated by design; widening to any author would false-fire on genuine humans"
